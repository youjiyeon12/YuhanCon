<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>글쓰기</title></head>
<body>
<h1>글쓰기</h1>
<form th:action="@{/boardWrite}" method="post">

    <input type="text" name="title" th:value="${board.title}" placeholder="제목" required><br>
    <textarea name="content" th:text="${board.content}" placeholder="내용" required></textarea><br>
    <button type="submit">저장</button>
</form>
</body>
</html>
