<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메인화면</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<!-- 상단 네비게이션 -->
<div class="navbar">
    <div class="nav-left">
        <a href="/main" class="logo">YuhanCon</a>
        <a href="/main">홈</a>
        <a href="/concertinfo">공연정보</a>
        <a href="/boardlist">게시판</a>
        <a href="/mypage">마이페이지</a>
    </div>
    <div class="nav-right">
        <a href="/logout">로그아웃</a>
    </div>
</div>

<!-- 공연 사진 슬라이드 -->
<div class="slide-container">
    <div class="slide-button" id="prev">◁</div>

    <div class="slide-wrapper">
        <div class="slide-images" id="slideImages">
            <img src="/images/aespa.jpg" alt="공연1">
            <img src="/images/psy.jpg" alt="공연2">
            <img src="/images/blackpink.jpg" alt="공연3">
            <img src="/images/concert.jpg" alt="공연4">
        </div>
    </div>

    <div class="slide-button" id="next">▷</div>
</div>
<!-- 자동 슬라이드용 스크립트 -->
<script>
    const slideImages = document.getElementById('slideImages');
    const slides = slideImages.querySelectorAll('img');
    let currentIndex = 0;
    const totalSlides = slides.length;

    function showSlide(index) {
        const slideWidth = window.innerWidth; 
        slideImages.style.transform = `translateX(-${index * slideWidth}px)`;
    }

    function nextSlide() {
        currentIndex = (currentIndex + 1) % totalSlides;
        showSlide(currentIndex);
    }

    function prevSlide() {
        currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
        showSlide(currentIndex);
    }

    document.getElementById('next').addEventListener('click', nextSlide);
    document.getElementById('prev').addEventListener('click', prevSlide);

    setInterval(nextSlide, 4000); // 4초마다 자동 슬라이드
</script>

</body>
</html>
