<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공연 등록</title>
    <link rel="stylesheet" th:href="@{/css/concertWrite.css}">
</head>
<body>

<!-- 상단 네비게이션 -->
<div class="navbar">
    <div class="nav-left">
        <a href="/main" class="logo">YuhanCon</a>
        <a href="/main">홈</a>
        <a href="/concertList">공연정보</a>
        <a href="/boardMain">게시판</a>
        <a href="/mypage">마이페이지</a>
    </div>
    <div class="nav-right">
        <a href="/logout">로그아웃</a>
    </div>
</div>

<h1>공연 등록</h1>

<form th:action="@{/concert/save}" method="post" enctype="multipart/form-data">
    <div class="form-group">
        <label>공연 제목</label>
        <input type="text" name="title" required>
    </div>
    
    <div class="form-group">
        <label>공연 설명</label>
        <textarea name="content" rows="5" required></textarea>
    </div>
    
    <div class="form-group">
        <label>공연 장소</label>
        <input type="text" name="place" required>
    </div>
    
    <div class="form-group">
        <label>공연 날짜</label>
        <input type="date" name="date" required>
    </div>
    
    <div class="form-group">
        <label>총 좌석 수</label>
        <input type="number" name="totalSeats" required>
    </div>

    <div class="form-group">
        <label>이미지 업로드</label>
        <input type="file" name="imageFile" accept="image/*">
    </div>

    <div class="form-buttons">
        <button type="submit">등록</button>
        <a href="/concertList"><button type="button">취소</button></a>
    </div>
</form>

</body>
</html>
