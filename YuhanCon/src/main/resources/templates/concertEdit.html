<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공연 수정</title>
    <link rel="stylesheet" th:href="@{/css/concertEdit.css}">
</head>
<body>

<!-- 상단 네비게이션 -->
<div class="navbar">
    <div class="nav-left">
        <a href="/main" class="logo">YuhanCon</a>
        <a href="/main">홈</a>
        <a href="/concertList">공연정보</a>
        <a href="/boardMain">게시판</a>
        <a href="/mypage">마이페이지</a>
    </div>
    <div class="nav-right">
        <a href="/logout">로그아웃</a>
    </div>
</div>

<h1>공연 수정</h1>

<form th:action="@{'/concertEdit/' + ${concert.id}}" method="post" enctype="multipart/form-data">
    <div class="form-group">
        <label>공연 제목</label>
        <input type="text" name="title" th:value="${concert.title}" required>
    </div>

    <div class="form-group">
        <label>공연 설명</label>
        <textarea name="content" rows="5" th:text="${concert.content}" required></textarea>
    </div>

    <div class="form-group">
        <label>공연 장소</label>
        <input type="text" name="place" th:value="${concert.place}" required>
    </div>

    <div class="form-group">
        <label>공연 날짜</label>
        <input type="date" name="date" th:value="${concert.date}" required>
    </div>

    <div class="form-group">
        <label>총 좌석 수</label>
        <input type="number" name="totalSeats" th:value="${concert.totalSeats}" required>
    </div>

    <div class="form-group">
        <label>남은 좌석 수</label>
        <input type="number" name="availableSeats" th:value="${concert.availableSeats}" required>
    </div>

  	<div class="form-group">
        <label>새 이미지 업로드</label>
        <input type="file" name="imageFile" accept="image/*">

        <div th:if="${concert.image != null}">
            <p>현재 이미지:</p>
            <img th:src="@{${concert.image}}" alt="공연 이미지">
        </div>
    </div>
    
    <div class="form-buttons">
        <button type="submit">수정 완료</button>
        <a href="/concertList"><button type="button">취소</button></a>
    </div>
</form>

</body>
</html>
