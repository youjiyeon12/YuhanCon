<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>글 상세</title>
<link rel="stylesheet" th:href="@{/css/boardDetail.css}">
</head>
<body>
<!-- 상단 네비게이션 -->
<div class="navbar">
    <div class="nav-left">
        <a href="/main" class="logo">YuhanCon</a>
        <a href="/main">홈</a>
        <a href="/concertList">공연정보</a>
        <a href="/boardMain">게시판</a>
        <a href="/mypage">마이페이지</a>
    </div>
    <div class="nav-right">
        <a href="/logout">로그아웃</a>
    </div>
</div>

<h1 th:text="${board.title}">제목</h1>
<hr class="divider">
<div class="content-box">
    <div class="content-text" th:text="${board.content}"></div>
</div>


<div class="meta-info">
  <span th:text="${board.member.name}">작성자</span> ·
  <span th:text="${#temporals.format(board.boardAt, 'yyyy-MM-dd')}">작성일</span>
</div>


<hr class="divider">

<div class="detail-actions">
    <a th:href="@{'/boardEdit/' + ${board.id}}">수정</a>

    <form th:action="@{'/boardDelete/' + ${board.id}}" method="post" style="display:inline;">
        <button type="submit">삭제</button>
    </form>

    <a th:href="@{/boardMain}">목록으로</a>
</div>
</body>
</html>
